/* ==========================================================================
   Daggerdale Campaign Archive — Global Stylesheet
   Structure: Tufte CSS (sidenotes, margin notes, wide reading column)
   Visual: Sun Blades aesthetic (parchment, Crimson Text, IM Fell English SC)
   ========================================================================== */

/* --- ET Book (Tufte's body font) --- */
@font-face {
    font-family: "et-book";
    src: url("https://edwardtufte.github.io/tufte-css/et-book/et-book-roman-line-figures/et-book-roman-line-figures.woff") format("woff");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: "et-book";
    src: url("https://edwardtufte.github.io/tufte-css/et-book/et-book-display-italic-old-style-figures/et-book-display-italic-old-style-figures.woff") format("woff");
    font-weight: normal;
    font-style: italic;
    font-display: swap;
}
@font-face {
    font-family: "et-book";
    src: url("https://edwardtufte.github.io/tufte-css/et-book/et-book-bold-line-figures/et-book-bold-line-figures.woff") format("woff");
    font-weight: bold;
    font-style: normal;
    font-display: swap;
}

/* --- Design Tokens --- */
:root {
    --bg-parchment: #f4ead5;
    --bg-inset: #f7f0e0;
    --text-body: #2c1e0e;
    --text-heading: #4a1e08;
    --text-subheading: #6b2a0a;
    --text-secondary: #5a3d20;
    --text-aside: #3a2a15;
    --accent-border: #8b4513;
    --accent-border-light: #c9a96e;
    --accent-link: #3a5a7c;
    --accent-dagger: #4a1e08;

    --font-body: 'et-book', 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    --font-display: 'IM Fell English SC', 'Palatino Linotype', serif;

    /* Tufte-derived layout widths */
    --content-width: 600px;
    --margin-width: 250px;
    --margin-gap: 30px;
    --full-width: calc(var(--content-width) + var(--margin-gap) + var(--margin-width));
}

/* --- Reset & Base --- */
*, *::before, *::after { box-sizing: border-box; }

html { font-size: 18px; }

body {
    font-family: var(--font-body);
    background-color: var(--bg-parchment);
    color: var(--text-body);
    line-height: 1.65;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
}

/* --- Article Container (Tufte layout) --- */
article {
    width: var(--full-width);
    max-width: 95vw;
    margin: 0 auto;
    padding: 2rem 0;
    position: relative;
}

/* Main content column */
article > p,
article > ul,
article > ol,
article > blockquote,
article > table,
article > h2,
article > h3,
article > .document-meta,
article > .footnote,
article > .era-note {
    width: var(--content-width);
    max-width: 95vw;
}

/* --- Typography --- */
h1 {
    font-family: var(--font-display);
    font-size: 2.4em;
    color: var(--text-heading);
    font-weight: 700;
    letter-spacing: 0.03em;
    line-height: 1.15;
    margin: 0 0 0.4em 0;
}

h2 {
    font-family: var(--font-display);
    font-size: 1.4em;
    color: var(--text-heading);
    font-weight: 400;
    letter-spacing: 0.02em;
    margin: 2em 0 0.6em 0;
    padding-bottom: 0.3em;
    border-bottom: 1px solid var(--accent-border-light);
}

h3 {
    font-family: var(--font-display);
    font-size: 1.1em;
    color: var(--text-subheading);
    font-weight: 400;
    margin: 1.5em 0 0.4em 0;
}

h4 {
    font-family: var(--font-display);
    font-size: 1.0em;
    color: var(--text-subheading);
    font-weight: 400;
    margin: 1.2em 0 0.3em 0;
}

p {
    margin: 0 0 1em 0;
}

a {
    color: var(--accent-link);
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}

blockquote {
    margin: 1.2em 0 1.2em 1.5em;
    padding-left: 1em;
    border-left: 3px solid var(--accent-border-light);
    color: var(--text-secondary);
    font-style: italic;
}

strong { font-weight: 700; }
em { font-style: italic; }

hr {
    border: none;
    border-top: 1px solid var(--accent-border-light);
    margin: 2em 0;
    width: var(--content-width);
    max-width: 95vw;
}

/* --- Sidenotes & Margin Notes (Tufte mechanism) --- */
.sidenote,
.marginnote {
    float: right;
    clear: right;
    width: var(--margin-width);
    margin-right: calc(-1 * (var(--margin-width) + var(--margin-gap)));
    margin-bottom: 0.8em;
    font-size: 0.82em;
    line-height: 1.4;
    color: var(--text-aside);
    vertical-align: baseline;
    position: relative;
}

.marginnote img,
.margin-figure {
    width: 100%;
    max-width: var(--margin-width);
}

/* --- Tables --- */
table {
    width: 100%;
    max-width: var(--content-width);
    border-collapse: collapse;
    margin: 1.5em 0;
    font-size: 0.92em;
}

thead {
    background-color: var(--bg-inset);
}

th {
    padding: 0.5em 0.8em;
    text-align: left;
    font-weight: 600;
    color: var(--text-heading);
    border-bottom: 2px solid var(--accent-border-light);
}

td {
    padding: 0.5em 0.8em;
    border-bottom: 1px solid var(--accent-border-light);
}

tbody tr:hover {
    background-color: rgba(139, 69, 19, 0.04);
}

/* --- Document Metadata Header --- */
.document-meta {
    margin-bottom: 2em;
    padding-bottom: 1.2em;
    border-bottom: 2px solid var(--accent-border-light);
    text-align: center;
}

.document-meta h1 {
    margin-bottom: 0.2em;
}

.document-meta .subtitle {
    font-family: var(--font-display);
    font-size: 1.15em;
    color: var(--text-subheading);
    font-weight: 400;
    letter-spacing: 0.02em;
}

.document-meta .doc-date {
    font-style: italic;
    color: var(--text-secondary);
    font-size: 0.9em;
    margin-top: 0.3em;
}

.document-meta .doc-curator {
    font-size: 0.85em;
    color: var(--text-secondary);
    margin-top: 0.2em;
}

/* --- Editorial Notes (N.B. blocks) --- */
.footnote,
.editorial-note {
    font-size: 0.88em;
    color: var(--text-secondary);
    padding: 0.8em 0 0.8em 1.2em;
    border-left: 3px solid var(--accent-border-light);
    margin: 1em 0;
}

.nb-label {
    font-weight: 700;
    color: var(--text-heading);
    font-size: 0.9em;
}

/* --- Era Notes / Aside Boxes --- */
.era-note {
    background: linear-gradient(135deg, rgba(74,30,8,0.04), rgba(74,30,8,0.02));
    border: 1px solid var(--accent-border-light);
    border-radius: 3px;
    padding: 1em 1.2em;
    margin: 1.2em 0;
    font-size: 0.92em;
    color: var(--text-aside);
}

/* --- Lists --- */
ul, ol {
    padding-left: 1.5em;
    margin: 0.5em 0 1em 0;
}

li {
    margin-bottom: 0.3em;
}

/* --- Footer --- */
footer {
    width: var(--content-width);
    max-width: 95vw;
    margin: 3em auto 2em;
    padding-top: 1em;
    border-top: 2px solid var(--accent-border-light);
    text-align: center;
    font-size: 0.82em;
    color: var(--text-secondary);
}

/* --- Return-to-Top Button (bottom-right) --- */
.to-top-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
    width: 2.4rem;
    height: 2.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgba(244, 234, 213, 0.9);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 1px solid var(--accent-border-light);
    border-radius: 50%;
    color: var(--text-heading);
    font-size: 1.1rem;
    line-height: 1;
    text-decoration: none;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, background-color 0.15s ease, border-color 0.15s ease;
}
.to-top-btn.visible {
    opacity: 1;
    pointer-events: auto;
}
.to-top-btn:hover {
    background-color: var(--bg-parchment);
    border-color: var(--accent-border);
    text-decoration: none;
}

/* --- Table of Contents --- */
.toc {
    width: var(--content-width);
    max-width: 95vw;
    margin: 2em 0 2.5em;
    padding: 1em 1.2em;
    background-color: var(--bg-inset);
    border-left: 3px solid var(--accent-border-light);
    font-size: 0.92em;
}
.toc-label {
    font-family: var(--font-display);
    font-size: 0.9em;
    letter-spacing: 0.08em;
    color: var(--text-heading);
    margin: 0 0 0.5em 0;
    text-transform: uppercase;
}
.toc ul {
    list-style: none;
    padding: 0;
    margin: 0;
}
.toc li {
    padding: 0.18em 0;
    line-height: 1.4;
}
.toc li.toc-h3 {
    padding-left: 1.2em;
    font-size: 0.94em;
    color: var(--text-secondary);
}
.toc a {
    color: var(--text-body);
    text-decoration: none;
    border-bottom: 1px dotted transparent;
}
.toc a:hover {
    border-bottom-color: var(--accent-border);
}

/* Offset anchor scroll so fixed home button doesn't obscure headings */
article h2[id], article h3[id] {
    scroll-margin-top: 3.5rem;
}

/* --- Responsive: sidenotes flow inline on narrow screens --- */
@media (max-width: 900px) {
    article {
        width: auto;
        max-width: 95vw;
        padding: 4.5rem 1rem 1.5rem;
    }

    article > p,
    article > ul,
    article > ol,
    article > blockquote,
    article > table,
    article > h2,
    article > h3,
    article > .document-meta,
    article > .footnote,
    article > .era-note {
        width: 100%;
        max-width: 100%;
    }

    hr {
        width: 100%;
        max-width: 100%;
    }

    .sidenote,
    .marginnote {
        float: none;
        clear: both;
        display: block;
        width: 100%;
        max-width: 100%;
        margin: 0.6em 0 0.6em 0;
        padding: 0.5em 0.8em;
        background-color: var(--bg-inset);
        border-left: 3px solid var(--accent-border-light);
        border-radius: 0 3px 3px 0;
    }

    footer {
        width: auto;
    }
}

@media print {
    body { background: white; color: black; }
    .sidenote, .marginnote {
        float: none;
        display: block;
        width: 100%;
        margin: 0.5em 0;
        font-size: 0.85em;
    }
    a { color: black; }
}

        (function () {
            const btn = document.getElementById('to-top-btn');
            if (!btn) return;
            const threshold = 400;
            const onScroll = () => {
                if (window.scrollY > threshold) btn.classList.add('visible');
                else btn.classList.remove('visible');

            window.addEventListener('scroll', onScroll, { passive: true });
